name: Small Digital Service - Starter
description: Order a small website, code review, landing page audit, or automation plan.
title: "Order: Small Digital Service - Starter"
labels: ["order-intake", "small-service"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for ordering from city in the sky.

        This intake is for public or sanitized material only. Do not include logins, private pages, API keys, credentials, customer data, payment data, private prompts, cookies, private keys, wallet secrets, or regulated data.

        Starter prices: USD 19+ for focused reports, USD 49+ for static website or automation work. PayPal payment link and crypto invoice are available after scope is confirmed.

        Do not send funds until scope, amount, payment route, and delivery format are confirmed.
  - type: dropdown
    id: offer_selected
    attributes:
      label: Offer selected
      options:
        - Static website / landing page
        - Mini code review / bug risk report
        - Landing page copy / trust audit
        - Automation / LLM cost cleanup plan
        - Public GitHub or website audit
        - Not sure yet
    validations:
      required: true
  - type: input
    id: public_input
    attributes:
      label: Public URL or sanitized input
      description: One public website URL, public GitHub repository, public issue, or sanitized brief.
      placeholder: "https://example.com"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the deliverable help you fix, ship, understand, or decide?
      placeholder: "I need a simple page, a bug-risk review, or an automation plan."
    validations:
      required: true
  - type: input
    id: audience
    attributes:
      label: Audience
      description: Who is this page or repository trying to reach?
      placeholder: "indie SaaS founders"
    validations:
      required: false
  - type: textarea
    id: public_notes
    attributes:
      label: Public notes
      description: Optional public or sanitized context. Do not include private or sensitive data.
      placeholder: "Scope, preferred style, error summary, or output format."
    validations:
      required: false
  - type: dropdown
    id: payment_route
    attributes:
      label: Preferred payment route
      options:
        - PayPal payment link
        - USDT
        - USDC
        - BTC
        - ETH
        - Other supported crypto
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: crypto_asset
    attributes:
      label: Preferred crypto asset
      options:
        - USDT
        - USDC
        - BTC
        - ETH
        - Other supported crypto
        - PayPal payment link
    validations:
      required: true
  - type: checkboxes
    id: safety_confirmation
    attributes:
      label: Safety confirmation
      options:
        - label: I confirm this order includes only public information and no secrets, credentials, customer data, payment data, private keys, wallet secrets, or regulated data.
          required: true
